name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "STEP 1"
            echo "$HOME"

            echo "STEP 2"
            ls -la "$HOME"

            echo "STEP 3"
            ls -la "$HOME/.nvm"

            echo "STEP 4"
            test -f "$HOME/.nvm/nvm.sh" && echo "nvm.sh exists"

            echo "STEP 5"
            bash -lc 'source ~/.nvm/nvm.sh && nvm current'

            echo "STEP 6"